<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=eletrolab/">
  <title>EletroLab</title>
  <link rel="canonical" href="eletrolab/">
  <style>
    :root {
      color-scheme: dark;
      --background: #070b12;
      --surface: #101923;
      --primary: #69d2ff;
      --text: #edf7ff;
      --text-muted: #9fb2c5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--background);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 520px;
      border: 1px solid rgba(105, 210, 255, 0.2);
      border-radius: 8px;
      padding: 28px;
      background: var(--surface);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.3rem;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    a {
      color: var(--primary);
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <h1>EletroLab</h1>
    <p>Redirecionando para o simulador interativo de campos eletricos.</p>
    <a href="eletrolab/">Abrir simulador</a>
  </main>
  <script>
    window.location.replace("eletrolab/");
  </script>
</body>
</html>
